<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16233d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Canzoniere">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Canzoniere San Marco</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap');
  :root{--ink:#1c1b17;--paper:#f3efe4;--paper-deep:#e5ddc9;--navy:#16233d;--navy-deep:#101a2e;--gold:#c6a24d;--gold-bright:#e0bc6a;--wine:#6d1626;--wine-bright:#8a2035;--line:rgba(28,27,23,.10)}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  button,input,textarea,select{font:inherit}
  body{background:var(--paper);color:var(--ink);font-family:Inter,sans-serif;min-height:100vh}
  header{background:var(--navy);color:var(--paper);padding:2.4rem 1.5rem 2rem;text-align:center;border-bottom:1px solid rgba(198,162,77,.5)}
  h1{font-family:'Inter',sans-serif;font-weight:600;font-size:clamp(1.9rem,4.4vw,2.7rem);margin:0 0 .4rem;letter-spacing:-0.01em}
  header p.tag{color:rgba(233,226,205,.6);font-size:.92rem;margin:0}
  .app{max-width:1320px;margin:0 auto;display:grid;grid-template-columns:minmax(340px,28vw) minmax(0,1fr);gap:0;min-height:calc(100vh - 190px)}
  .board{background:var(--navy-deep);padding:1.6rem 1.2rem 2.5rem}
  .board-label{font-family:'Roboto Mono',monospace;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-bright);margin:0 0 .9rem .1rem}
  #search{width:100%;padding:.6rem .75rem;border-radius:4px;border:1px solid rgba(198,162,77,.3);background:rgba(233,226,205,.05);color:var(--paper);font-family:Inter,sans-serif;font-size:.92rem;outline:none;margin-bottom:1.1rem;transition:border-color .15s,background .15s}
  #search::placeholder{color:rgba(233,226,205,.38)}
  #search:focus{border-color:var(--gold-bright);background:rgba(233,226,205,.08)}
  .list-filters{display:flex;gap:.45rem;margin:0 0 .85rem}
  .filter-btn{flex:1;border:1px solid rgba(198,162,77,.28);border-radius:4px;background:transparent;color:rgba(233,226,205,.72);font-family:'Roboto Mono',monospace;font-size:.69rem;letter-spacing:.04em;text-transform:uppercase;padding:.45rem .5rem;cursor:pointer}
  .filter-btn:hover{background:rgba(198,162,77,.08)}
  .filter-btn.active{background:var(--gold-bright);border-color:var(--gold-bright);color:var(--navy-deep)}
  .setlist-tools{margin:0 0 .9rem;padding:.7rem;border:1px solid rgba(198,162,77,.24);border-radius:4px;background:rgba(198,162,77,.06);color:var(--paper)}
  .setlist-title-row{display:flex;align-items:center;justify-content:space-between;gap:.7rem}
  .setlist-title-row strong{display:block;font-size:.86rem;font-weight:600}
  .setlist-count{display:block;margin-top:.12rem;color:rgba(233,226,205,.42);font-family:'Roboto Mono',monospace;font-size:.64rem}
  .setlist-title-actions{display:flex;align-items:center;gap:.45rem}
  .setlist-share,.setlist-rename,.setlist-clear{border:0;background:transparent;color:rgba(233,226,205,.55);font-family:'Roboto Mono',monospace;font-size:.66rem;text-decoration:underline;cursor:pointer;padding:.2rem}
  .setlist-share:hover,.setlist-rename:hover,.setlist-clear:hover{color:var(--gold-bright)}
  .setlist-import-note{margin:.6rem 0 0;padding:.55rem .65rem;border:1px solid rgba(198,162,77,.22);border-radius:4px;background:rgba(198,162,77,.07);color:rgba(233,226,205,.72);font-size:.72rem}
  .setlist-help{margin:.35rem 0 0;color:rgba(233,226,205,.42);font-size:.72rem}
  .tile-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.2rem}
  .tile-row{display:grid;grid-template-columns:1fr auto;align-items:center}
  .tile{display:flex;align-items:center;gap:.7rem;width:100%;min-width:0;text-align:left;background:transparent;border:0;border-left:2px solid transparent;border-radius:0;padding:.6rem .45rem .6rem .6rem;cursor:pointer;color:rgba(233,226,205,.8);font-family:Inter,sans-serif;font-size:1rem;transition:background .15s,border-color .15s}
  .favorite-btn{width:2.15rem;height:2.15rem;display:flex;align-items:center;justify-content:center;border:0;background:transparent;color:rgba(233,226,205,.38);font-size:1.12rem;cursor:pointer;border-radius:4px}
  .favorite-btn:hover{background:rgba(198,162,77,.08);color:var(--gold-bright)}
  .favorite-btn.active{color:var(--gold-bright)}
  .favorite-btn:focus-visible{outline:2px solid var(--gold-bright);outline-offset:-2px}
  .tile-actions{display:flex;align-items:center}
  .setlist-add,.setlist-order{width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;border:0;background:transparent;color:rgba(233,226,205,.42);font-family:'Roboto Mono',monospace;font-size:.82rem;cursor:pointer;border-radius:4px}
  .setlist-add:hover,.setlist-order:hover{background:rgba(198,162,77,.08);color:var(--gold-bright)}
  .setlist-add.active{color:var(--gold-bright)}
  .setlist-order:disabled{opacity:.2;cursor:default}
  .tile:hover{background:rgba(198,162,77,.07)}
  .tile:focus-visible{outline:2px solid var(--gold-bright);outline-offset:-2px}
  .tile.active{background:rgba(198,162,77,.1);border-left-color:var(--gold-bright);color:var(--paper)}
  .num{flex:0 0 auto;width:1.62rem;height:1.62rem;display:flex;align-items:center;justify-content:center;background:transparent;color:rgba(224,188,106,.78);font-family:'Roboto Mono',monospace;font-weight:600;font-size:.69rem;border:1px solid rgba(198,162,77,.26);border-radius:3px}
  .tile.active .num{background:var(--gold-bright);color:var(--navy-deep);border-color:var(--gold-bright)}
  .tile-title{line-height:1.3;min-width:0;overflow-wrap:anywhere}
  .tile-title small{display:block;font-family:'Roboto Mono',monospace;font-size:.72rem;letter-spacing:.04em;color:rgba(233,226,205,.45);margin-top:.15rem}
  .empty-note{color:rgba(233,226,205,.4);font-size:.85rem;padding:.5rem}
  main{padding:2.2rem clamp(1.2rem,4vw,3rem) 4rem;min-width:0}
  .song-nav{display:flex;position:sticky;top:0;z-index:20;align-items:center;justify-content:space-between;gap:.7rem;flex-wrap:wrap;background:rgba(243,239,228,.97);border-bottom:1px solid var(--line);margin:0 0 1.1rem;padding:.5rem 0;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .command-group{display:flex;align-items:center;gap:.45rem;flex-wrap:nowrap;min-width:0}
  .toolbar-controls{display:flex;align-items:center;gap:.65rem;flex-wrap:nowrap;min-width:0}
  .primary-actions{display:flex;align-items:center;gap:.38rem;min-width:0}
  .secondary-actions{display:flex;align-items:center;gap:.55rem;min-width:0}
  .transpose-controls{display:grid;grid-template-columns:auto 1.7rem minmax(4.8rem,auto) 1.7rem auto;align-items:center;gap:.4rem;min-width:0}
  .text-controls{display:grid;grid-template-columns:auto 1.9rem 2.7rem 1.9rem;align-items:center;gap:.4rem}
  .command-separator{width:1px;height:1.35rem;background:var(--line);margin:0 .15rem}
  .back-list{display:inline-flex;align-items:center;gap:.45rem;border:0;background:transparent;color:var(--wine);font-family:Inter,sans-serif;font-size:.88rem;font-weight:600;padding:.45rem 0;cursor:pointer}
  .back-list:hover{color:var(--wine-bright)}
  .back-list:focus-visible{outline:2px solid var(--wine);outline-offset:3px}
  .back-arrow{font-size:1.2rem;line-height:1}
  .song-head{display:flex;align-items:flex-start;gap:1rem;border-bottom:1px solid var(--line);padding-bottom:1.1rem;margin-bottom:1.6rem}
  .song-head .num{width:1.95rem;height:1.95rem;font-size:.76rem;color:rgba(109,22,38,.76);border-color:rgba(109,22,38,.22)}
  .song-title{font-family:'Inter',sans-serif;font-weight:600;font-size:clamp(1.5rem,3vw,2.1rem);margin:0;line-height:1.15;letter-spacing:-0.01em}
  .song-sub{color:rgba(28,27,23,.5);font-size:.9rem;margin-top:.3rem}
  .badges{display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap}
  .badge{font-family:'Roboto Mono',monospace;font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;padding:.2rem .5rem;border-radius:3px;background:transparent;color:var(--wine);border:1px solid rgba(109,22,38,.25)}
  .transpose-row{display:flex;align-items:center;gap:.55rem;margin-top:.9rem;flex-wrap:wrap}
  .transpose-label{font-family:'Roboto Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(28,27,23,.45)}
  .transpose-btn{width:1.7rem;height:1.7rem;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--line);background:transparent;color:var(--ink);font-family:'Roboto Mono',monospace;font-weight:600;font-size:.95rem;line-height:1;cursor:pointer;transition:background .15s,border-color .15s}
  .transpose-btn:hover{background:rgba(198,162,77,.14);border-color:var(--gold)}
  .transpose-value{font-family:'Roboto Mono',monospace;font-size:.74rem;color:var(--wine);min-width:0;text-align:center;white-space:nowrap}
  .transpose-reset{font-family:'Roboto Mono',monospace;font-size:.68rem;text-decoration:underline;color:rgba(28,27,23,.4);background:none;border:0;padding:0;cursor:pointer}
  .transpose-reset:hover{color:var(--wine)}
  .text-size-label{font-family:'Roboto Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(28,27,23,.45)}
  .text-size-value{font-family:'Roboto Mono',monospace;font-size:.72rem;color:var(--wine);min-width:2.7rem;text-align:center}
  .command-btn{width:1.9rem;height:1.9rem;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--line);background:transparent;color:var(--ink);font-family:'Roboto Mono',monospace;font-weight:600;font-size:.92rem;line-height:1;cursor:pointer;transition:background .15s,border-color .15s}
  .command-btn:hover{background:rgba(198,162,77,.14);border-color:var(--gold)}
  .command-btn:focus-visible{outline:2px solid var(--wine);outline-offset:2px}
  .song-favorite{width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--line);background:transparent;color:rgba(28,27,23,.38);font-size:1.12rem;line-height:1;cursor:pointer}
  .song-favorite.active{color:var(--gold);border-color:rgba(198,162,77,.55);background:rgba(198,162,77,.10)}
  .song-setlist{height:2rem;display:flex;align-items:center;justify-content:center;gap:.3rem;border-radius:4px;border:1px solid var(--line);background:transparent;color:rgba(28,27,23,.55);font-family:'Roboto Mono',monospace;font-size:.66rem;padding:0 .5rem;cursor:pointer;white-space:nowrap}
  .song-setlist.active{color:var(--wine);border-color:rgba(109,22,38,.3);background:rgba(109,22,38,.06)}
  .lyrics-only-toggle{height:2rem;display:flex;align-items:center;justify-content:center;gap:.3rem;border-radius:4px;border:1px solid var(--line);background:transparent;color:rgba(28,27,23,.55);font-family:'Roboto Mono',monospace;font-size:.66rem;padding:0 .5rem;cursor:pointer;white-space:nowrap}
  .lyrics-only-toggle.active{color:var(--wine);border-color:rgba(109,22,38,.3);background:rgba(109,22,38,.06)}
  .lyrics-only-line{display:none;font-family:'Roboto Mono',monospace;font-size:var(--song-font-size);font-weight:500;line-height:1.65;white-space:pre-wrap;overflow-wrap:normal;word-break:normal}
  .sheet.lyrics-only .chordline,
  .sheet.lyrics-only .music-row{display:none}
  .sheet.lyrics-only .lyrics-only-line{display:block}
  .setlist-nav{display:flex;align-items:center;gap:.4rem}
  .setlist-nav button{border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:4px;font-family:'Roboto Mono',monospace;font-size:.68rem;padding:.38rem .5rem;cursor:pointer}
  .setlist-nav button:disabled{opacity:.3;cursor:default}
  .setlist-position{font-family:'Roboto Mono',monospace;font-size:.68rem;color:rgba(28,27,23,.5)}
  .sheet{--song-font-size:16px;background:transparent;border:0;border-radius:0;padding:0 0 .35rem;box-shadow:none;overflow-x:auto}
  .block{margin-bottom:1rem}
  .block:last-child{margin-bottom:0}
  .chordline,.lyricline{font-family:'Roboto Mono',monospace;font-size:var(--song-font-size);letter-spacing:-0.015em;white-space:pre;width:max-content;min-width:100%}
  .chordline{font-weight:700;color:#9c1a34;line-height:1.6}
  .lyricline{font-weight:500;line-height:1.65}
  .music-row{display:flex;flex-wrap:nowrap;align-items:flex-start;width:max-content;min-width:100%;font-family:'Roboto Mono',monospace;font-size:var(--song-font-size);margin-bottom:.08rem}
  .music-segment{flex:0 0 calc(var(--cols) * 1ch);width:calc(var(--cols) * 1ch);min-width:0}
  .segment-chord,.segment-lyric{white-space:pre;overflow:visible}
  .segment-chord{font-weight:700;color:#9c1a34;line-height:1.6;min-height:1.6em}
  .segment-lyric{font-weight:500;line-height:1.65}
  .headline{font-family:'Roboto Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);background:rgba(198,162,77,.10);display:inline-block;padding:.17rem .48rem;border-radius:2px;margin:.85rem 0 .18rem}
  .sheet>.headline:first-child{margin-top:0}
  .spacer{height:.5rem}
  footer{text-align:center;font-family:'Roboto Mono',monospace;font-size:.72rem;letter-spacing:.04em;color:rgba(28,27,23,.45);padding:1.4rem 1rem 2rem}
  .beta-feedback-link{margin-top:.55rem;border:0;background:transparent;color:var(--wine);font:inherit;text-decoration:underline;cursor:pointer}
  .feedback-trigger{height:2rem;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--line);background:transparent;color:rgba(28,27,23,.52);font-family:'Roboto Mono',monospace;font-size:.66rem;padding:0 .48rem;cursor:pointer;white-space:nowrap}
  .feedback-trigger:hover{color:var(--wine);border-color:rgba(109,22,38,.3);background:rgba(109,22,38,.05)}
  .feedback-modal[hidden]{display:none}
  .feedback-modal{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:1rem}
  .feedback-backdrop{position:absolute;inset:0;background:rgba(16,26,46,.62);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
  .feedback-card{position:relative;z-index:1;width:min(560px,100%);max-height:calc(100vh - 2rem);overflow:auto;background:var(--paper);color:var(--ink);border:1px solid rgba(198,162,77,.35);border-radius:10px;padding:1.25rem;box-shadow:0 24px 70px rgba(16,26,46,.28)}
  .feedback-card h2{margin:0 2rem .35rem 0;font-size:1.25rem}
  .feedback-intro{margin:0 0 1rem;color:rgba(28,27,23,.58);font-size:.9rem}
  .feedback-close{position:absolute;top:.65rem;right:.7rem;width:2rem;height:2rem;border:0;border-radius:4px;background:transparent;color:var(--wine);font-size:1.4rem;cursor:pointer}
  .feedback-field{display:block;margin:.85rem 0}
  .feedback-field>span{display:block;margin-bottom:.35rem;font-size:.8rem;font-weight:600}
  .feedback-field small{font-weight:400;color:rgba(28,27,23,.45)}
  .feedback-field input,.feedback-field select,.feedback-field textarea{width:100%;border:1px solid rgba(28,27,23,.15);border-radius:5px;background:#fffdf7;color:var(--ink);padding:.68rem .75rem;font-family:Inter,sans-serif;font-size:.95rem;outline:none}
  .feedback-field input:focus,.feedback-field select:focus,.feedback-field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(198,162,77,.12)}
  .feedback-field textarea{resize:vertical;min-height:7rem}
  .feedback-actions{display:flex;justify-content:flex-end;gap:.55rem;margin-top:1rem}
  .feedback-cancel,.feedback-submit{border-radius:5px;padding:.65rem .85rem;font-family:Inter,sans-serif;font-weight:600;cursor:pointer}
  .feedback-cancel{border:1px solid var(--line);background:transparent;color:var(--ink)}
  .feedback-submit{border:1px solid var(--wine);background:var(--wine);color:#fff}
  .feedback-status{min-height:1.2rem;margin:.7rem 0 0;font-size:.82rem;color:var(--wine)}
  .feedback-honeypot{position:absolute;left:-9999px}


  @media (min-width:1280px){
    .app{grid-template-columns:minmax(380px,30vw) minmax(0,1fr)}
  }

  @media (min-width:821px) and (max-width:1100px){
    .app{grid-template-columns:minmax(320px,38vw) minmax(0,1fr)}
    .tile{font-size:1.05rem;padding:.68rem .55rem .68rem .62rem}
    .tile-title small{font-size:.74rem}
  }

  @media (max-width:820px){
    .tile{font-size:1.06rem;padding:.68rem .5rem .68rem .6rem}
    .tile-title small{font-size:.74rem}
    .app{grid-template-columns:1fr}
    .board{border-bottom:1px solid rgba(198,162,77,.25)}
    body:not(.song-open) main{display:none}
    body.song-open .board{display:none}
    body.song-open main{display:block;padding-top:0}
    .song-nav{display:grid;grid-template-columns:1fr;margin:0 0 .9rem;padding:.42rem 0;gap:.42rem}
    .song-nav>.command-group:first-child{display:grid;grid-template-columns:auto 1fr;align-items:center;width:100%;gap:.4rem}
    .primary-actions{justify-content:flex-end;gap:.32rem}
    .toolbar-controls{display:grid;grid-template-columns:1fr auto;width:100%;gap:.4rem}
    .transpose-controls{grid-template-columns:1.7rem minmax(4rem,1fr) 1.7rem auto;gap:.28rem}
    .text-controls{grid-template-columns:1.9rem 2.35rem 1.9rem;gap:.25rem}
    .back-list{font-size:.8rem;padding:.38rem 0}
    .text-size-label,.transpose-label,.command-separator{display:none}
    .transpose-value{font-size:.66rem}
    .transpose-reset{font-size:.58rem}
    .song-favorite{width:1.9rem;height:1.9rem}
    .song-setlist,.lyrics-only-toggle,.feedback-trigger{height:1.9rem;padding:0 .38rem;font-size:.6rem}
    .feedback-card{padding:1rem;border-radius:8px}
    .song-title{font-size:clamp(1.35rem,6vw,1.8rem)}
    .song-head{gap:.75rem;padding-bottom:.85rem;margin-bottom:1rem}
    .setlist-nav{justify-content:space-between;margin:.1rem 0 .85rem}
    .music-row{flex-wrap:wrap;width:100%;min-width:0;column-gap:0;row-gap:.22rem;margin-bottom:.35rem}
    .music-segment{max-width:100%}
    .chordline,.lyricline{width:100%;min-width:0;white-space:pre-wrap;overflow-wrap:anywhere}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header><h1>Canzoniere San Marco</h1><p class="tag">canti e accordi per la messa</p></header>
<div class="app">
  <nav class="board" aria-label="Elenco canti">
    <div class="board-label">Bacheca dei canti</div>
    <div class="list-filters" role="group" aria-label="Filtro canti">
      <button class="filter-btn active" id="filterAll" type="button">Tutti</button>
      <button class="filter-btn" id="filterFavorites" type="button">★ Preferiti</button>
      <button class="filter-btn" id="filterSetlist" type="button">Scaletta</button>
    </div>
    <div class="setlist-tools" id="setlistTools" hidden>
      <div class="setlist-title-row">
        <div>
          <strong id="setlistTitle">La mia scaletta</strong>
          <span class="setlist-count" id="setlistCount">0 canti</span>
        </div>
        <div class="setlist-title-actions">
          <button class="setlist-share" id="shareSetlist" type="button">Condividi</button>
          <button class="setlist-rename" id="renameSetlist" type="button">Rinomina</button>
          <button class="setlist-clear" id="clearSetlist" type="button">Svuota</button>
        </div>
      </div>
      <p class="setlist-help">Usa le frecce per cambiare l’ordine.</p>
    </div>
    <input id="search" type="search" placeholder="Cerca titolo o parole..." autocomplete="off" enterkeyhint="search">
    <ul class="tile-list" id="tileList"></ul>
  </nav>
  <main id="main"></main>
</div>
<footer>
  <div>Il libretto dei canti della Parrocchia San Marco di Udine</div>
  <button class="beta-feedback-link" id="generalFeedback" type="button">Versione beta · Segnala un errore o proponi un miglioramento</button>
</footer>

<div class="feedback-modal" id="feedbackModal" hidden>
  <div class="feedback-backdrop" data-close-feedback></div>
  <section class="feedback-card" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
    <button class="feedback-close" id="feedbackClose" type="button" aria-label="Chiudi">×</button>
    <h2 id="feedbackTitle">Invia una segnalazione</h2>
    <p class="feedback-intro" id="feedbackIntro">Aiutaci a migliorare il Canzoniere.</p>

    <form name="segnalazioni-canzoniere" method="POST" data-netlify="true" netlify-honeypot="bot-field" id="feedbackForm">
      <input type="hidden" name="form-name" value="segnalazioni-canzoniere">
      <p class="feedback-honeypot"><label>Non compilare: <input name="bot-field"></label></p>

      <input type="hidden" name="canto" id="feedbackSong">
      <input type="hidden" name="canto_id" id="feedbackSongId">
      <input type="hidden" name="pagina" id="feedbackPage">
      <input type="hidden" name="dispositivo" id="feedbackDevice">

      <label class="feedback-field">
        <span>Tipo di segnalazione</span>
        <select name="tipo" required>
          <option value="">Seleziona…</option>
          <option value="Testo errato">Testo errato</option>
          <option value="Accordo errato">Accordo errato</option>

  me  odieranno   anche   voi,                 voi non  temete:  non   vi lascio soli.","lines":[{"t":"h","v":"Ritornello"},{"t":"c","v":"          SI-               RE          SOL          LA7"},{"t":"l","v":"Andate    per  le strade   in tutto  il mondo,"},{"t":"c","v":"            FA#             SI-   LA        RE"},{"t":"l","v":"      chiamate     i miei  amici  per   far festa,"},{"t":"c","v":"               FA#                 SOL     LA        SI-"},{"t":"l","v":"      c'è  un  posto   per  ciascuno      alla  mia  mensa!"},{"t":"s"},{"t":"h","v":"Strofa 1"},{"t":"c","v":"                     RE            SOL              LA7           RE"},{"t":"l","v":"             1. Nel  vostro   cammino      annunciate     il Vangelo,"},{"t":"c","v":"                   SI-             MI-          FA#-       SI-"},{"t":"l","v":"                dicendo:    \"è vicino   il Regno   dei  cieli\"."},{"t":"c","v":"                    SI-      SOL              LA7           RE"},{"t":"l","v":"                Guarite   i malati,  mondate      i lebbrosi,"},{"t":"c","v":"                    SI-         FA#-      DO#7          FA#7"},{"t":"l","v":"                rendete   la vita  a chi  l'ha perduta."},{"t":"s"},{"t":"h","v":"Strofa 2"},{"t":"l","v":"             2. Vi è stato donato   con  amore   gratuito:"},{"t":"l","v":"                ugualmente   donate   con  gioia e per  amore."},{"t":"l","v":"                Con  voi  non  prendete  né  oro  né argento,"},{"t":"l","v":"                perché  l'operaio  ha diritto al suo cibo."},{"t":"s"},{"t":"h","v":"Strofa 3"},{"t":"l","v":"             3. Entrando   in una  casa donatele   pace."},{"t":"l","v":"                Se c'è chi vi rifiuta e non accoglie  il dono"},{"t":"l","v":"                la pace torni a  voi, e uscite dalla casa"},{"t":"l","v":"                scuotendo   la polvere  dai vostri calzari."},{"t":"s"},{"t":"h","v":"Strofa 4"},{"t":"l","v":"             4. Ecco  io vi mando   come   agnelli in mezzo mode":"maggiore"},"search":"Il Canto dell'Amore  Strofa 1       Se dovrai  attraversare  il deserto non  temere   io sarò con  te.       Se dovrai  camminare    nel fuoco  la sua  fiamma   non  ti brucerà.       Seguirai la mia  luce nella notte,       sentirai la mia forza  nel cammino,       io sono  il tuo Dio,       il Signore.  Strofa 2       Sono  io che  ti ho fatto e plasmato,   ti ho chiamato   per nome.       Io da  sempre  ti ho conosciuto   e ti ho dato  il mio amore.       Perché  tu sei prezioso  ai miei occhi,       vali più del più  grande  dei tesori,       io sarò con  te,        ovunque   andrai.  Strofa 3       Non   pensare  alle cose di ieri, cose nuove  fioriscono  già;       aprirò  nel deserto  sentieri, darò acqua  nell'aridità.       Perché  tu sei prezioso  ai miei occhi,       vali più del più  grande  dei tesori,       io sarò con  te,        ovunque   andrai.  Finale - poi ripetere la Strofa 3       Io ti sa - rò accanto, sarò con  te;       per tutto    il tuo viaggio sarò  con  te. (2 volte)","lines":[{"t":"h","v":"Strofa 1"},{"t":"c","v":"              RE                    SI-           SOL               RE"},{"t":"l","v":"      Se dovrai  attraversare  il deserto non  temere   io sarò con  te."},{"t":"c","v":"              RE                    SI-          SOL                   RE"},{"t":"l","v":"      Se dovrai  camminare    nel fuoco  la sua  fiamma   non  ti brucerà."},{"t":"c","v":"            LA        SOL          RE      RE"},{"t":"l","v":"      Seguirai la mia  luce nella notte,"},{"t":"c","v":"           MI-        LA              SI-     SI-"},{"t":"l","v":"      sentirai la mia forza  nel cammino,"},{"t":"c","v":"         DO                SOL           RE    RE"},{"t":"l","v":"      io sono  il tuo Dio,       il Signore."},{"t":"s"},{"t":"h","v":"Strofa 2"},{"t":"c","v":"            RE                          SI-             SOL            RE"},{"t":"l","v":"      Sono  io che  ti ho fatto e plasmato,   ti ho chiamat function migrateStoredSongRefs(raw){
  const refs=Array.isArray(raw)?raw:[];
  const ids=[];
  refs.forEach(ref=>{
    if(typeof ref==='string' && songs.some(song=>song.id===ref)){
      ids.push(ref);
    }else if(Number.isInteger(ref) && songs[ref]){
      ids.push(songs[ref].id);
    }
  });
  return [...new Set(ids)];
}
let favorites=new Set(migrateStoredSongRefs(JSON.parse(localStorage.getItem('favoriteSongs')||'[]')));
let personalSetlist=migrateStoredSongRefs(JSON.parse(localStorage.getItem('personalSetlist')||'[]'));

function pad(n){return String(n+1).padStart(2,'0')}
function normalizeSearch(value){
  return String(value||'')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,' ')
    .trim();
}
function songMatches(song,query){
  const words=normalizeSearch(query).split(/\s+/).filter(Boolean);
  if(!words.length)return true;
  const haystack=normalizeSearch([song.title,song.sub,song.search].filter(Boolean).join(' '));
  return words.every(word=>haystack.includes(word));
}
function saveFavorites(){
  localStorage.setItem('favoriteSongs',JSON.stringify([...favorites]));
}
function songId(index){
  return songs[index]?.id;
}
function isFavorite(index){
  return favorites.has(songId(index));
}
function toggleFavorite(index){
  const id=songId(index);
  if(!id)return;
  if(favorites.has(id))favorites.delete(id);
  else favorites.add(id);
  saveFavorites();
  renderTiles();
  if(document.body.classList.contains('song-open')&&activeIndex===index)renderSong(index);
}
function setListMode(mode){
  listMode=mode;
  filterAll.classList.toggle('active',mode==='all');
  filterFavorites.classList.toggle('active',mode==='favorites');
  filterSetlist.classList.toggle('active',mode==='setlist');
  setlistTools.hidden=mode!=='setlist';
  renderTiles();
}
function saveSetlist(){
  localStorage.setItem('personalSetlist',JSON.stringify(personalSetlist));
}
function updateSetlistHeader(){
  setlistTitle.textContent=personalSetlistName;
  setlistCount.textContent=personalSetlist.length===1?'1 canto':`${personalSetlist.length} canti`;
}
function buildSetlistShareUrl(){
  const url=new URL(window.location.href);
  url.search='';
  url.hash='';
  url.searchParams.set('scaletta',personalSetlist.join(','));
  url.searchParams.set('nome',personalSetlistName);
  return url.toString();
}
async function shareCurrentSetlist(){
  if(!personalSetlist.length){
    alert('La scaletta è vuota.');
    return;
  }
  const url=buildSetlistShareUrl();
  const shareData={
    title:personalSetlistName,
    text:`Scaletta: ${personalSetlistName}`,
    url
  };
  if(navigator.share){
    try{
      await navigator.share(shareData);
      return;
    }catch(error){
      if(error && error.name==='AbortError')return;
    }
  }
  try{
    await navigator.clipboard.writeText(url);
    alert('Link della scaletta copiato.');
  }catch{
    prompt('Copia questo link:',url);
  }
}
function importSetlistFromUrl(){
  const params=new URLSearchParams(window.location.search);
  if(!params.has('scaletta'))return;
  const imported=params.get('scaletta')
    .split(',')
    .map(value=>decodeURIComponent(value.trim()))
    .filter(id=>songs.some(song=>song.id===id));
  const unique=[...new Set(imported)];
  if(!unique.length)return;

  const importedName=(params.get('nome')||'Scaletta condivisa').trim().slice(0,40);
  const accept=confirm(`Importare la scaletta "${importedName}" con ${unique.length} canti?`);
  if(accept){
    personalSetlist=unique;
    personalSetlistName=importedName||'Scaletta condivisa';
    saveSetlist();
    localStorage.setItem('personalSetlistName',personalSetlistName);
    setListMode('setlist');
  }

  // Clean the URL after handling so reloading does not ask again.
  const cleanUrl=new URL(window.location.href);
  cleanUrl.searchParams.delete('scaletta');
  cleanUrl.searchParams.delete('nome');
  history.replaceState({},'',cleanUrl.pathname+cleanUrl.search+cleanUrl.hash);
}
function isInSetlist(index){
  return personalSetlist.includes(songId(index));
}
function toggleSetlist(index){
  const id=songId(index);
  if(!id)return;
  if(isInSetlist(index))personalSetlist=personalSetlist.filter(item=>item!==id);
  else personalSetlist.push(id);
  saveSetlist();
  renderTiles();
  if(document.body.classList.contains('song-open')&&activeIndex===index)renderSong(index);
}
function moveSetlistItem(index,direction){
  const pos=personalSetlist.indexOf(songId(index));
  const target=pos+direction;
  if(pos<0||target<0||target>=personalSetlist.length)return;
  [personalSetlist[pos],personalSetlist[target]]=[personalSetlist[target],personalSetlist[pos]];
  saveSetlist();
  renderTiles();
}
function setlistPosition(index){
  return personalSetlist.indexOf(songId(index));
}
function songIndexFromId(id){
  return songs.findIndex(song=>song.id===id);
}
function openFeedback(index=null){
  feedbackForm.reset();
  feedbackStatus.textContent='';
  const song=Number.isInteger(index)?songs[index]:null;
  feedbackSong.value=song?song.title+(song.sub?` — ${song.sub}`:''):'Segnalazione generale';
  feedbackSongId.value=song?song.id:'';
  feedbackPage.value=window.location.href;
  feedbackDevice.value=navigator.userAgent;
  feedbackIntro.textContent=song
    ?`Segnalazione relativa a “${song.title}${song.sub?` — ${song.sub}`:''}”.`
    :'Segnala un problema generale o proponi un miglioramento.';
  feedbackModal.hidden=false;
  document.body.style.overflow='hidden';
  setTimeout(()=>feedbackForm.querySelector('select')?.focus(),0);
}
function closeFeedback(){
  feedbackModal.hidden=true;
  document.body.style.overflow='';
}
function encodeFormData(form){
  return new URLSearchParams(new FormData(form)).toString();
}
async function submitFeedback(event){
  event.preventDefault();
  const submitButton=feedbackForm.querySelector('[type="submit"]');
  submitButton.disabled=true;
  feedbackStatus.textContent='Invio in corso…';
  try{
    const response=await fetch('/',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:encodeFormData(feedbackForm)
    });
    if(!response.ok)throw new Error('Invio non riuscito');
    feedbackStatus.textContent='Grazie! La segnalazione è stata inviata.';
    setTimeout(closeFeedback,1200);
  }catch(error){
    feedbackStatus.textContent='Non sono riuscita a inviare. Controlla la connessione e riprova.';
  }finally{
    submitButton.disabled=false;
  }
}
const NOTES=['DO','DO#','RE','RE#','MI','FA','FA#','SOL','SOL#','LA','LA#','SI'];
const NOTE_INDEX={'DO':0,'DO#':1,'REB':1,'RE':2,'RE#':3,'MIB':3,'MI':4,'FAB':4,'FA':5,'FA#':6,'SOLB':6,'SOL':7,'SOL#':8,'LAB':8,'LA':9,'LA#':10,'SIB':10,'SI':11,'DOB':11};
const ROOT_RE=/^([([{]*)(DO|RE|MI|FA|SOL|LA|SI)(#|[Bb])?([A-Za-z0-9+\-]*)([)\]}]*)$/;
function transposeSingle(tok,shift){const m=tok.match(ROOT_RE);if(!m)return tok;const[,pre,root,acc,suffix,post]=m;const idx=NOTE_INDEX[root+(acc?acc.toUpperCase():'')];if(idx===undefined)return tok;return pre+NOTES[((idx+shift)%12+12)%12]+suffix+post}
function transposeToken(tok,shift){return tok.includes('/')?tok.split('/').map(p=>transposeSingle(p,shift)).join('/'):transposeSingle(tok,shift)}
function transposeLine(text,shift){
  if(!shift)return text;
  return text.replace(/(\S+)(\s*)/g,(full,tok,gap)=>{
    const moved=transposeToken(tok,shift);
    if(!gap)return moved;
    const gapLength=Math.max(1,gap.length+tok.length-moved.length);
    return moved+' '.repeat(gapLength);
  });
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function songIndexFromHash(){const match=location.hash.match(/^#canto-(\d+)$/);if(!match)return null;const index=Number(match[1])-1;return index>=0&&index<songs.length?index:null}
function showSong(i,updateHistory=true){const wasOpen=document.body.classList.contains('song-open');if(!wasOpen)listScrollY=window.scrollY;activeIndex=i;renderTiles();renderSong(i);document.body.classList.add('song-open');if(updateHistory){const method=wasOpen?'replaceState':'pushState';history[method]({view:'song',song:i},'',`#canto-${i+1}`)}window.scrollTo({top:0,behavior:'auto'})}
function showList(){document.body.classList.remove('song-open');renderTiles();requestAnimationFrame(()=>window.scrollTo({top:listScrollY,behavior:'auto'}))}
function backToList(){if(history.state&&history.state.view==='song')history.back();else{history.replaceState({view:'list'},'',location.pathname+location.search);showList()}}
function renderTiles(filter=search.value){
  updateSetlistHeader();
  tileList.innerHTML='';
  let any=false;
  const query=typeof filter==='string'?filter:search.value;

  let ordered;
  if(listMode==='setlist'){
    ordered=personalSetlist.map(id=>{
      const i=songIndexFromId(id);
      return {song:songs[i],i};
    }).filter(item=>item.song&&item.i>=0);
  }else{
    ordered=songs.map((song,i)=>({song,i})).sort((a,b)=>{
      if(listMode==='all'){
        const favDiff=Number(isFavorite(b.i))-Number(isFavorite(a.i));
        if(favDiff)return favDiff;
      }
      return a.i-b.i;
    });
  }

  ordered.forEach(({song,i})=>{
    if(listMode==='favorites'&&!isFavorite(i))return;
    if(!songMatches(song,query))return;
    any=true;

    const li=document.createElement('li');
    li.className='tile-row';

    const btn=document.createElement('button');
    btn.className='tile'+(i===activeIndex?' active':'');
    btn.innerHTML=`<span class="num">${pad(i)}</span><span class="tile-title">${esc(song.title)}${song.sub?`<small>${esc(song.sub)}</small>`:''}</span>`;
    btn.addEventListener('click',()=>showSong(i));

    const actions=document.createElement('div');
    actions.className='tile-actions';

    if(listMode==='setlist'){
      const pos=setlistPosition(i);

      const up=document.createElement('button');
      up.type='button';
      up.className='setlist-order';
      up.textContent='↑';
      up.title='Sposta su';
      up.disabled=pos<=0;
      up.addEventListener('click',event=>{
        event.stopPropagation();
        moveSetlistItem(i,-1);
      });

      const down=document.createElement('button');
      down.type='button';
      down.className='setlist-order';
      down.textContent='↓';
      down.title='Sposta giù';
      down.disabled=pos===personalSetlist.length-1;
      down.addEventListener('click',event=>{
        event.stopPropagation();
        moveSetlistItem(i,1);
      });

      const remove=document.createElement('button');
      remove.type='button';
      remove.className='setlist-add active';
      remove.textContent='×';
      remove.title='Rimuovi dalla scaletta';
      remove.addEventListener('click',event=>{
        event.stopPropagation();
        toggleSetlist(i);
      });

      actions.append(up,down,remove);
    }else{
      const add=document.createElement('button');
      add.type='button';
      add.className='setlist-add'+(isInSetlist(i)?' active':'');
      add.textContent=isInSetlist(i)?'✓':'+';
      add.title=isInSetlist(i)?'Rimuovi dalla scaletta':'Aggiungi alla scaletta';
      add.addEventListener('click',event=>{
        event.stopPropagation();
        toggleSetlist(i);
      });

      const fav=document.createElement('button');
      fav.type='button';
      fav.className='favorite-btn'+(isFavorite(i)?' active':'');
      fav.setAttribute('aria-label',isFavorite(i)?'Rimuovi dai preferiti':'Aggiungi ai preferiti');
      fav.setAttribute('aria-pressed',String(isFavorite(i)));
      fav.textContent=isFavorite(i)?'★':'☆';
      fav.addEventListener('click',event=>{
        event.stopPropagation();
        toggleFavorite(i);
      });

      actions.append(add,fav);
    }

    li.append(btn,actions);
    tileList.appendChild(li);
  });

  if(!any){
    const message=listMode==='favorites'
      ?'Nessun canto preferito.'
      :listMode==='setlist'
        ?'La scaletta è vuota. Aggiungi i canti con il pulsante +.'
        :'Nessun canto trovato.';
    tileList.innerHTML=`<p class="empty-note">${message}</p>`;
  }
}

function splitLongSegment(chordPart,lyricPart,maxChars=28){
  const width=Math.max(chordPart.length,lyricPart.length);
  if(width<=maxChars)return [{chord:chordPart,lyric:lyricPart,cols:Math.max(1,width)}];

  const chunks=[];
  let remaining=lyricPart;
  let first=true;

  while(remaining.length>maxChars){
    let cut=remaining.lastIndexOf(' ',maxChars);
    if(cut<8)cut=maxChars;
    const piece=remaining.slice(0,cut).replace(/\s+$/,'');
    chunks.push({
      chord:first?chordPart:'',
      lyric:piece,
      cols:Math.max(1,(first?chordPart.length:0),piece.length)
    });
    remaining=remaining.slice(cut).replace(/^\s+/,'');
    first=false;
  }

  chunks.push({
    chord:first?chordPart:'',
    lyric:remaining,
    cols:Math.max(1,(first?chordPart.length:0),remaining.length)
  });
  return chunks;
}

function renderChordLyricPair(chordText,lyricText,shift){
  const chord=transposeLine((chordText||'').trimStart(),shift);
  const lyric=(lyricText||'').trimStart();
  const matches=[...chord.matchAll(/\S+/g)];

  if(!matches.length){
    return `<div class="lyricline">${esc(lyric)}</div>`;
  }

  const boundaries=[];
  if(matches[0].index>0)boundaries.push(0);
  matches.forEach(match=>boundaries.push(match.index));

  const pieces=[];
  for(let j=0;j<boundaries.length;j++){
    const start=boundaries[j];
    const end=j+1<boundaries.length?boundaries[j+1]:Math.max(chord.length,lyric.length);
    const chordPart=chord.slice(start,end).replace(/\s+$/,'');
    const lyricPart=lyric.slice(start,end).replace(/\s+$/,'');
    pieces.push(...splitLongSegment(chordPart,lyricPart));
  }

  return `<div class="music-row">${pieces.map(piece=>
    `<div class="music-segment" style="--cols:${piece.cols}"><div class="segment-chord">${esc(piece.chord)}</div><div class="segment-lyric">${esc(piece.lyric)}</div></div>`
  ).join('')}</div><div class="lyrics-only-line">${esc(lyric)}</div>`;
}

function renderSong(i){
  const song=songs[i];
  const shift=shiftState[i]||0;
  let html=`<div class="song-nav">
    <div class="command-group">
      <button class="back-list" id="backList" type="button"><span class="back-arrow" aria-hidden="true">←</span>Elenco</button>
      <div class="primary-actions">
        <button class="song-favorite${isFavorite(i)?' active':''}" id="songFavorite" type="button" aria-label="${isFavorite(i)?'Rimuovi dai preferiti':'Aggiungi ai preferiti'}" aria-pressed="${isFavorite(i)}">${isFavorite(i)?'★':'☆'}</button>
        <button class="song-setlist${isInSetlist(i)?' active':''}" id="songSetlist" type="button">${isInSetlist(i)?'✓ Scaletta':'+ Scaletta'}</button>
        <button class="lyrics-only-toggle${lyricsOnly?' active':''}" id="lyricsOnlyToggle" type="button" aria-pressed="${lyricsOnly}">${lyricsOnly?'Solo testo':'Accordi'}</button>
        <button class="feedback-trigger" id="songFeedback" type="button">Segnala</button>
      </div>
    </div>
    <div class="toolbar-controls" aria-label="Comandi canto">
      <div class="transpose-controls">
        <span class="transpose-label">Tonalità</span>
        <button class="transpose-btn" id="tDown" type="button" aria-label="Abbassa tonalità">−</button>
        <span class="transpose-value">${shift===0?'Originale':(shift>0?'+':'')+shift+' semitoni'}</span>
        <button class="transpose-btn" id="tUp" type="button" aria-label="Alza tonalità">+</button>
        ${shift!==0?'<button class="transpose-reset" id="tReset" type="button">reset</button>':'<span></span>'}
      </div>
      <span class="command-separator" aria-hidden="true"></span>
      <div class="text-controls">
        <span class="text-size-label">Testo</span>
        <button class="command-btn" id="fontDown" type="button" aria-label="Riduci testo">A−</button>
        <span class="text-size-value" id="fontValue">${songFontSize}px</span>
        <button class="command-btn" id="fontUp" type="button" aria-label="Ingrandisci testo">A+</button>
      </div>
    </div>
  </div>
  <div class="song-head"><span class="num">${pad(i)}</span><div><h2 class="song-title">${esc(song.title)}</h2>${song.sub?`<div class="song-sub">${esc(song.sub)}</div>`:''}</div></div>
  ${isInSetlist(i)?`<div class="setlist-nav">
    <button id="setlistPrev" type="button" ${setlistPosition(i)<=0?'disabled':''}>← Precedente</button>
    <span class="setlist-position">${setlistPosition(i)+1} di ${personalSetlist.length}</span>
    <button id="setlistNext" type="button" ${setlistPosition(i)>=personalSetlist.length-1?'disabled':''}>Successivo →</button>
  </div>`:''}
  <div class="sheet${lyricsOnly?' lyrics-only':''}" style="--song-font-size:${songFontSize}px">`;

  for(let lineIndex=0;lineIndex<song.lines.length;lineIndex++){
    const line=song.lines[lineIndex];
    const next=song.lines[lineIndex+1];

    if(line.t==='c' && next && next.t==='l'){
      html+=renderChordLyricPair(line.v,next.v,shift);
      lineIndex++;
      continue;
    }

    const cleanText=(line.v||'').trimStart();
    if(line.t==='c')html+=`<div class="chordline">${esc(transposeLine(cleanText,shift))}</div>`;
    else if(line.t==='l')html+=`<div class="lyricline lyrics-only-plain">${esc(cleanText)}</div>`;
    else if(line.t==='h')html+=`<div class="headline">${esc(cleanText)}</div>`;
    else html+='<div class="spacer"></div>';
  }

  main.innerHTML=html+'</div>';

  document.getElementById('backList').addEventListener('click',backToList);
  document.getElementById('songFavorite').addEventListener('click',()=>toggleFavorite(i));
  document.getElementById('songSetlist').addEventListener('click',()=>toggleSetlist(i));
  document.getElementById('songFeedback').addEventListener('click',()=>openFeedback(i));
  document.getElementById('lyricsOnlyToggle').addEventListener('click',()=>{
    lyricsOnly=!lyricsOnly;
    localStorage.setItem('lyricsOnlyMode',String(lyricsOnly));
    renderSong(i);
  });
  const prevBtn=document.getElementById('setlistPrev');
  const nextBtn=document.getElementById('setlistNext');
  if(prevBtn)prevBtn.addEventListener('click',()=>showSong(songIndexFromId(personalSetlist[setlistPosition(i)-1])));
  if(nextBtn)nextBtn.addEventListener('click',()=>showSong(songIndexFromId(personalSetlist[setlistPosition(i)+1])));
  document.getElementById('tUp').addEventListener('click',()=>{shiftState[i]=(shiftState[i]||0)+1;renderSong(i)});
  document.getElementById('tDown').addEventListener('click',()=>{shiftState[i]=(shiftState[i]||0)-1;renderSong(i)});
  const reset=document.getElementById('tReset');
  if(reset)reset.addEventListener('click',()=>{shiftState[i]=0;renderSong(i)});

  const changeFontSize=delta=>{
    songFontSize=Math.min(22,Math.max(12,songFontSize+delta));
    localStorage.setItem('songFontSize',songFontSize);
    const sheet=main.querySelector('.sheet');
    if(sheet)sheet.style.setProperty('--song-font-size',songFontSize+'px');
    const value=document.getElementById('fontValue');
    if(value)value.textContent=songFontSize+'px';
  };
  document.getElementById('fontDown').addEventListener('click',()=>changeFontSize(-1));
  document.getElementById('fontUp').addEventListener('click',()=>changeFontSize(1));
}
search.addEventListener('input',()=>renderTiles());
search.addEventListener('search',()=>renderTiles());
filterAll.addEventListener('click',()=>setListMode('all'));
filterFavorites.addEventListener('click',()=>setListMode('favorites'));
filterSetlist.addEventListener('click',()=>setListMode('setlist'));
shareSetlist.addEventListener('click',shareCurrentSetlist);
renameSetlist.addEventListener('click',()=>{
  const newName=prompt('Nome della scaletta:',personalSetlistName);
  if(newName===null)return;
  const cleanName=newName.trim().replace(/\s+/g,' ');
  if(!cleanName)return;
  personalSetlistName=cleanName.slice(0,40);
  localStorage.setItem('personalSetlistName',personalSetlistName);
  updateSetlistHeader();
});
clearSetlist.addEventListener('click',()=>{
  if(!personalSetlist.length)return;
  if(confirm('Vuoi svuotare la scaletta personale?')){
    personalSetlist=[];
    saveSetlist();
    renderTiles();
  }
});

generalFeedback.addEventListener('click',()=>openFeedback());
feedbackClose.addEventListener('click',closeFeedback);
feedbackModal.querySelectorAll('[data-close-feedback]').forEach(element=>element.addEventListener('click',closeFeedback));
feedbackForm.addEventListener('submit',submitFeedback);
document.addEventListener('keydown',event=>{
  if(event.key==='Escape'&&!feedbackModal.hidden)closeFeedback();
});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
  });
}

window.addEventListener('popstate',()=>{const index=songIndexFromHash();if(index===null)showList();else showSong(index,false)});
const initialSong=songIndexFromHash();
if(initialSong===null){history.replaceState({view:'list'},'',location.pathname+location.search);renderTiles();renderSong(0)}else{history.replaceState({view:'list'},'',location.pathname+location.search);showSong(initialSong,true)}
importSetlistFromUrl();
